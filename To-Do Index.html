<!DOCTYPE html>
<html>
<head>
  <title>Focus Todo Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: #111827;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      margin-bottom: 15px;
    }

    input {
      width: 65%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin-left: 5px;
    }

    .task {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1f2937;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
    }

    .completed {
      text-decoration: line-through;
      opacity: 0.6;
    }

    #timer {
      font-size: 42px;
      text-align: center;
      margin: 15px 0;
      color: #22c55e;
    }

    .progress {
      text-align: center;
      margin-top: 10px;
      color: #93c5fd;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🔥 Focus Todo Pro</h1>

  <div class="card">
    <input id="taskInput" placeholder="Enter your task">
    <button onclick="addTask()">Add</button>

    <div id="taskList"></div>
    <div class="progress" id="progress"></div>
  </div>

  <div class="card">
    <div id="timer">25:00</div>
    <div style="text-align:center;">
      <button onclick="startTimer()">Start</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
  let input = document.getElementById("taskInput");
  if (!input.value) return;

  tasks.push({ text: input.value, done: false });
  input.value = "";
  saveTasks();
  renderTasks();
}

function toggleTask(i) {
  tasks[i].done = !tasks[i].done;
  saveTasks();
  renderTasks();
}

function deleteTask(i) {
  tasks.splice(i, 1);
  saveTasks();
  renderTasks();
}

function renderTasks() {
  let list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, i) => {
    let div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <span class="${task.done ? 'completed' : ''}">
        ${task.text}
      </span>
      <div>
        <button onclick="toggleTask(${i})">✔</button>
        <button onclick="deleteTask(${i})">❌</button>
      </div>
    `;

    list.appendChild(div);
  });

  updateProgress();
}

function updateProgress() {
  let done = tasks.filter(t => t.done).length;
  document.getElementById("progress").innerText =
    `Completed: ${done} / ${tasks.length}`;
}

// Timer
let time = 1500;
let timer;
let running = false;

function startTimer() {
  if (running) return;

  running = true;
  timer = setInterval(() => {
    if (time > 0) {
      time--;
      updateTimer();
    } else {
      clearInterval(timer);
      alert("Time's up!");
      running = false;
    }
  }, 1000);
}

function resetTimer() {
  clearInterval(timer);
  running = false;
  time = 1500;
  updateTimer();
}

function updateTimer() {
  let m = Math.floor(time / 60);
  let s = time % 60;
  document.getElementById("timer").innerText =
    `${m}:${s < 10 ? "0" : ""}${s}`;
}

renderTasks();
</script>

</body>
</html>
